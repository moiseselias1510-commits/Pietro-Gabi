<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Tempo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
background:
linear-gradient(180deg,#78cfff,#a7e2ff);
display:flex;
justify-content:center;
align-items:center;
padding:30px;
position:relative;
}

/* FUNDO AZUL */

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,
rgba(255,255,255,.45),
transparent 30%),

radial-gradient(circle at bottom right,
rgba(255,255,255,.3),
transparent 35%);
z-index:-3;
}

/* LOGIN */

#login{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:340px;

padding:40px 28px;

border-radius:35px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 20px 40px rgba(0,0,0,.12);

text-align:center;
}

.heart{
font-size:42px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-8px);
}
}

input{
width:100%;
height:52px;

border:none;
outline:none;

border-radius:999px;

padding:0 18px;

font-size:16px;

background:rgba(255,255,255,.88);

margin-bottom:18px;
}

button{
width:100%;
height:52px;

border:none;
cursor:pointer;

border-radius:999px;

font-size:16px;
font-weight:700;

color:white;

background:
linear-gradient(90deg,#2ea4ff,#7d4dff);

box-shadow:
0 10px 25px rgba(78,140,255,.35);

transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

#error{
margin-top:14px;
font-size:15px;
color:#fff;
}

/* SITE */

#site{
display:none;
width:min(1050px,100%);
}

.top{
text-align:center;
margin-bottom:28px;
}

.top h1{
font-size:48px;
font-weight:800;
color:white;
text-shadow:0 8px 20px rgba(0,0,0,.12);
}

.top p{
color:rgba(255,255,255,.9);
margin-top:8px;
font-size:17px;
}

/* QUADROS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

@media(max-width:850px){
.grid{
grid-template-columns:1fr;
}
}

/* BOXES */

.time-box{
position:relative;
overflow:visible;

padding:28px;

border-radius:34px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.22);

box-shadow:
0 18px 40px rgba(0,0,0,.12);

z-index:2;
}

/* AURA ANIME */

.time-box::before{
content:"";
position:absolute;

inset:-20px;

border-radius:50px;

background:

radial-gradient(circle at 20% 20%,
rgba(0,170,255,.9),
transparent 28%),

radial-gradient(circle at 80% 30%,
rgba(136,0,255,.85),
transparent 34%),

radial-gradient(circle at 50% 80%,
rgba(0,120,255,.8),
transparent 36%);

filter:blur(34px);

opacity:.9;

z-index:-1;

animation:auraMove 6s ease-in-out infinite alternate;
}

.time-box::after{
content:"";
position:absolute;

inset:-6px;

border-radius:38px;

border:1px solid rgba(120,0,255,.25);

box-shadow:
0 0 22px rgba(0,170,255,.45),
0 0 48px rgba(120,0,255,.25);

z-index:-1;

animation:auraPulse 3s ease-in-out infinite;
}

@keyframes auraMove{

0%{
transform:scale(1) rotate(0deg);
filter:blur(34px);
}

50%{
transform:scale(1.08) rotate(2deg);
filter:blur(42px);
}

100%{
transform:scale(1.03) rotate(-2deg);
filter:blur(38px);
}

}

@keyframes auraPulse{

0%{
opacity:.45;
}

50%{
opacity:1;
}

100%{
opacity:.6;
}

}

.box-title{
text-align:center;
font-size:28px;
font-weight:800;
color:white;
margin-bottom:22px;
}

/* CONTADOR */

.counter-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.counter{
padding:18px 12px;

border-radius:22px;

background:rgba(255,255,255,.14);

border:1px solid rgba(255,255,255,.2);

text-align:center;
}

.number{
display:block;
font-size:34px;
font-weight:800;
color:white;
}

.label{
display:block;
margin-top:5px;
font-size:15px;
color:rgba(255,255,255,.88);
}

/* MENSAGEM */

.message-box{
margin-top:24px;

padding:24px;

border-radius:34px;

background:rgba(255,255,255,.16);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.22);

box-shadow:
0 18px 40px rgba(0,0,0,.12);

text-align:center;
}

.message-date{
font-size:15px;
color:rgba(255,255,255,.82);
margin-bottom:14px;
}

.message-text{
font-size:22px;
font-weight:700;
line-height:1.6;
color:white;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="login">

<div class="login-box">

<div class="heart">💜</div>

<input type="password" id="senha" placeholder="Senha">

<button onclick="entrar()">Entrar</button>

<div id="error"></div>

</div>

</div>

<!-- SITE -->

<div id="site">

<div class="top">
<h1>Nosso Tempo</h1>
<p>Dois contadores diferentes</p>
</div>

<div class="grid">

<!-- OFICIAL -->

<div class="time-box">

<div class="box-title">
Oficial
</div>

<div class="counter-grid">

<div class="counter">
<span class="number" id="oDias">0</span>
<span class="label">Dias</span>
</div>

<div class="counter">
<span class="number" id="oHoras">0</span>
<span class="label">Horas</span>
</div>

<div class="counter">
<span class="number" id="oMin">0</span>
<span class="label">Minutos</span>
</div>

<div class="counter">
<span class="number" id="oSeg">0</span>
<span class="label">Segundos</span>
</div>

</div>

</div>

<!-- NÃO OFICIAL -->

<div class="time-box">

<div class="box-title">
Não Oficial
</div>

<div class="counter-grid">

<div class="counter">
<span class="number" id="nDias">0</span>
<span class="label">Dias</span>
</div>

<div class="counter">
<span class="number" id="nHoras">0</span>
<span class="label">Horas</span>
</div>

<div class="counter">
<span class="number" id="nMin">0</span>
<span class="label">Minutos</span>
</div>

<div class="counter">
<span class="number" id="nSeg">0</span>
<span class="label">Segundos</span>
</div>

</div>

</div>

</div>

<!-- MENSAGEM -->

<div class="message-box">

<div class="message-date" id="messageDate"></div>

<div class="message-text" id="messageText"></div>

</div>

</div>

<script>

const senhaCorreta = "210425";

function entrar(){

const senha = document.getElementById("senha").value;

if(senha === senhaCorreta){

document.getElementById("login").style.display = "none";

document.getElementById("site").style.display = "block";

}else{

document.getElementById("error").innerText = "Senha incorreta";

}

}

/* DATAS */

const oficial = new Date("2025-04-21T00:00:00");
const naoOficial = new Date("2024-10-09T00:00:00");

/* CONTADOR */

function atualizar(){

const agora = new Date();

contador(oficial,"o");
contador(naoOficial,"n");

function contador(data,prefixo){

const diff = agora - data;

const dias = Math.floor(diff / 1000 / 60 / 60 / 24);

const horas = agora.getHours();
const minutos = agora.getMinutes();
const segundos = agora.getSeconds();

document.getElementById(prefixo+"Dias").innerText = dias;
document.getElementById(prefixo+"Horas").innerText = horas;
document.getElementById(prefixo+"Min").innerText = minutos;
document.getElementById(prefixo+"Seg").innerText = segundos;

}

}

setInterval(atualizar,1000);
atualizar();

/* MENSAGENS */

const mensagens = [

{
date:"2026-05-21",
text:"Você transformou meus dias em algo muito melhor."
},

{
date:"2026-06-21",
text:"Mesmo depois de tanto tempo, ainda escolho você todos os dias."
},

{
date:"2026-07-21",
text:"Cada momento vivido ao seu lado virou uma lembrança especial."
},

{
date:"2026-08-21",
text:"Seu sorriso continua sendo uma das minhas coisas favoritas."
},

{
date:"2026-09-21",
text:"Algumas pessoas passam pela nossa vida. Você virou parte da minha."
},

{
date:"2026-10-21",
text:"O tempo passa rápido quando os momentos são especiais."
},

{
date:"2026-11-21",
text:"Ainda existem muitos momentos bonitos esperando por nós."
},

{
date:"2026-12-21",
text:"Obrigado por fazer parte da minha história."
}

];

function atualizarMensagem(){

const agora = new Date();

let atual = mensagens[0];

for(let i=0;i<mensagens.length;i++){

const data = new Date(mensagens[i].date+"T00:00:00");

if(agora >= data){

atual = mensagens[i];

}

}

document.getElementById("messageText").innerText = atual.text;

const data = new Date(atual.date+"T00:00:00");

document.getElementById("messageDate").innerText =
data.toLocaleDateString("pt-BR",{
day:"numeric",
month:"long",
year:"numeric"
});

}

atualizarMensagem();

</script>

</body>
</html>
