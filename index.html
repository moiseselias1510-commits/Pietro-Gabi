<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nosso Tempo</title>
<style>
:root{
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.18);
  --shadow:0 18px 45px rgba(0,0,0,.18);
  --text:rgba(255,255,255,.9);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:"Segoe UI",sans-serif;
  color:white;
  background:#1a1a2e; /* cor de fundo para bordas quando a imagem não preenche */
}

/* Fundo de login - agora usa contain para mostrar toda a imagem */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url("fundo-login.png") center/contain no-repeat;
  background-color:#1a1a2e; /* mesma cor do body para preencher bordas */
  z-index:-3;
  transition:.8s;
}

body.inside::before{
  background:url("fundo-site.png") center/contain no-repeat;
  background-color:#1a1a2e;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top, rgba(255,255,255,.12), transparent 40%),
  linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.16));
  z-index:-2;
}

/* Splash screen */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.3);
  z-index:100;
  backdrop-filter:blur(4px);
  transition: opacity 1s ease, visibility 1s ease;
}
#splash.hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
#splash img{
  max-width:300px;
  width:70vw;
  height:auto;
  animation: rotate3d 3s ease-in-out forwards;
  transform-origin: center;
  perspective:600px;
}
@keyframes rotate3d{
  0%{ transform:perspective(600px) rotateY(0deg) scale(0.9); opacity:0.4; }
  20%{ opacity:1; }
  80%{ transform:perspective(600px) rotateY(360deg) scale(1); opacity:1; }
  100%{ transform:perspective(600px) rotateY(360deg) scale(1); opacity:1; }
}

/* Login */
.screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-card{
  width:min(410px,92vw);
  border-radius:30px;
  padding:34px 24px;
  text-align:center;
  animation:fadeUp 1s ease;
  opacity:0;
  transition: opacity 1s ease;
}
.login-card.visible{
  opacity:1;
}

/* Campos mais transparentes */
.login-card input{
  width:100%;
  border:none;
  outline:none;
  padding:15px 18px;
  border-radius:999px;
  font-size:16px;
  margin-bottom:14px;
  background:rgba(255,255,255,.5); /* mais transparente */
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#333;
}
.login-card input::placeholder{
  color:rgba(0,0,0,.4);
}
.login-card button{
  width:100%;
  border:none;
  cursor:pointer;
  padding:14px;
  border-radius:999px;
  font-size:16px;
  font-weight:700;
  color:white;
  background:linear-gradient(135deg,#ff5f95,#ff3d7c);
  box-shadow:0 12px 28px rgba(255,65,120,.28);
  transition:.25s;
  opacity:0.9;
}
.login-card button:hover{
  transform:translateY(-2px);
}

.error{
  margin-top:14px;
  color:#fff2b8;
  min-height:20px;
}

.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.hidden{
  display:none !important;
}

/* Site */
#site{
  width:min(1000px,92vw);
  margin:34px auto 60px;
  opacity:0;
  transform:translateY(18px);
  pointer-events:none;
  transition:1s;
}
#site.show{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.header{
  text-align:center;
  margin-bottom:26px;
}
.header h1{
  font-size:clamp(2.3rem,5vw,3.5rem);
  margin-bottom:12px;
  text-shadow:0 8px 24px rgba(0,0,0,.18);
}
.header p{
  color:var(--text);
}

/* Contadores */
.counters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  margin-bottom:24px;
}
.counter-card{
  border-radius:30px;
  padding:26px 22px;
  position:relative;
  overflow:visible !important;
}
/* Luzes brilhantes */
.counter-card:nth-child(1){
  box-shadow:
    0 0 20px rgba(255,255,255,0.6),
    0 0 40px rgba(255,255,255,0.4),
    0 0 60px rgba(255,255,255,0.2),
    inset 0 0 10px rgba(255,255,255,0.1);
  animation: glowWhite 2s ease-in-out infinite alternate;
}
.counter-card:nth-child(2){
  box-shadow:
    0 0 20px rgba(255,255,0,0.6),
    0 0 40px rgba(255,255,0,0.4),
    0 0 60px rgba(255,255,0,0.2),
    inset 0 0 10px rgba(255,255,0,0.1);
  animation: glowYellow 2s ease-in-out infinite alternate;
}
@keyframes glowWhite{
  from{
    box-shadow:
      0 0 20px rgba(255,255,255,0.5),
      0 0 40px rgba(255,255,255,0.3),
      0 0 60px rgba(255,255,255,0.1);
  }
  to{
    box-shadow:
      0 0 30px rgba(255,255,255,0.8),
      0 0 60px rgba(255,255,255,0.5),
      0 0 80px rgba(255,255,255,0.3);
  }
}
@keyframes glowYellow{
  from{
    box-shadow:
      0 0 20px rgba(255,255,0,0.5),
      0 0 40px rgba(255,255,0,0.3),
      0 0 60px rgba(255,255,0,0.1);
  }
  to{
    box-shadow:
      0 0 30px rgba(255,255,0,0.8),
      0 0 60px rgba(255,255,0,0.5),
      0 0 80px rgba(255,255,0,0.3);
  }
}

.counter-title{
  text-align:center;
  margin-bottom:20px;
  font-size:1.2rem;
  font-weight:700;
  letter-spacing:.05em;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.box{
  border-radius:20px;
  padding:18px 10px;
  text-align:center;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
}
.number{
  display:block;
  font-size:1.6rem;
  font-weight:800;
  margin-bottom:6px;
}
.label{
  color:rgba(255,255,255,.85);
  font-size:.9rem;
}

/* Mensagem */
.message-card{
  border-radius:30px;
  padding:28px;
  text-align:center;
}
.message-card h2{
  margin-bottom:18px;
  font-size:1.1rem;
  letter-spacing:.05em;
  color:rgba(255,255,255,.9);
}
.message{
  font-size:clamp(1.05rem,2vw,1.4rem);
  line-height:1.9;
  font-weight:700;
}
.date{
  margin-top:18px;
  color:rgba(255,255,255,.75);
  font-size:.95rem;
}

/* Animações */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(18px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}
@keyframes pulse{
  0%,100%{
    transform:rotate(-45deg) scale(1);
  }
  50%{
    transform:rotate(-45deg) scale(1.06);
  }
}

/* Responsivo */
@media(max-width:850px){
  .counters{
    grid-template-columns:1fr;
  }
  .grid{
    grid-template-columns:repeat(2,1fr);
  }
}
@media(max-width:520px){
  .login-card,
  .counter-card,
  .message-card{
    padding:20px;
  }
  .grid{
    gap:10px;
  }
  .number{
    font-size:1.3rem;
  }
  .box{
    padding:16px 8px;
  }
}
</style>
</head>
<body>

<!-- SPLASH INTRO -->
<div id="splash">
  <img src="intro-image.png" alt="Introdução" id="introImg">
</div>

<!-- LOGIN -->
<section class="screen" id="loginScreen">
  <div class="login-card glass" id="loginCard">
    <div class="heart"></div>
    <h1>Nosso Tempo</h1>
    <p>Um cantinho simples para guardar o tempo.</p>
    <input type="password" id="password" placeholder="Senha">
    <button id="enterBtn">Entrar</button>
    <div class="error" id="error"></div>
  </div>
</section>

<!-- SITE -->
<main id="site">
  <div class="header">
    <h1>Nosso Tempo</h1>
    <p>Cada segundo continua sendo especial.</p>
  </div>

  <section class="counters">
    <!-- OFICIAL -->
    <div class="counter-card glass">
      <div class="counter-title">Oficial</div>
      <div class="grid">
        <div class="box"><span class="number" id="oy">0</span><span class="label">anos</span></div>
        <div class="box"><span class="number" id="om">0</span><span class="label">meses</span></div>
        <div class="box"><span class="number" id="od">0</span><span class="label">dias</span></div>
        <div class="box"><span class="number" id="oh">0</span><span class="label">horas</span></div>
        <div class="box"><span class="number" id="omi">0</span><span class="label">minutos</span></div>
        <div class="box"><span class="number" id="os">0</span><span class="label">segundos</span></div>
      </div>
    </div>

    <!-- NÃO OFICIAL -->
    <div class="counter-card glass">
      <div class="counter-title">Não Oficial</div>
      <div class="grid">
        <div class="box"><span class="number" id="ny">0</span><span class="label">anos</span></div>
        <div class="box"><span class="number" id="nm">0</span><span class="label">meses</span></div>
        <div class="box"><span class="number" id="nd">0</span><span class="label">dias</span></div>
        <div class="box"><span class="number" id="nh">0</span><span class="label">horas</span></div>
        <div class="box"><span class="number" id="nmi">0</span><span class="label">minutos</span></div>
        <div class="box"><span class="number" id="ns">0</span><span class="label">segundos</span></div>
      </div>
    </div>
  </section>

  <section class="message-card glass">
    <h2>Mensagem do mês</h2>
    <div class="message" id="monthMessage"></div>
    <div class="date" id="monthDate"></div>
  </section>
</main>

<script>
const PASSWORD = "210425";
const officialDate = new Date(2025, 3, 21);
const unofficialDate = new Date(2024, 9, 9);

const monthlyMessages = [
  { date:"2026-05-21", text:"O tempo passa, mas continuar ao seu lado ainda é uma das melhores partes dos meus dias." },
  { date:"2026-06-21", text:"Mesmo depois de tantos dias, ainda gosto de cada momento que passamos juntos." },
  { date:"2026-07-21", text:"Você transformou momentos simples em lembranças que eu nunca quero esquecer." },
  { date:"2026-08-21", text:"Ainda acho incrível como alguém pode significar tanto na vida de outra pessoa." },
  { date:"2026-09-21", text:"Espero que o tempo continue sendo gentil com a nossa história." },
  { date:"2026-10-21", text:"Não importa quanto tempo passe, algumas pessoas continuam especiais do mesmo jeito." },
  { date:"2026-11-21", text:"Tem dias que tudo parece melhor só por lembrar de você." },
  { date:"2026-12-21", text:"Mais um fim de ano chegando e eu ainda gosto de olhar para tudo que construímos." }
];

// Elementos
const splash = document.getElementById('splash');
const loginScreen = document.getElementById('loginScreen');
const loginCard = document.getElementById('loginCard');
const site = document.getElementById('site');
const passwordInput = document.getElementById('password');
const enterBtn = document.getElementById('enterBtn');
const error = document.getElementById('error');

// Mostra splash por 5 segundos (3 de rotação + 2 parado)
setTimeout(() => {
  splash.classList.add('hidden');
  // Após sumir o splash, espera 3 segundos para o login aparecer
  setTimeout(() => {
    loginCard.classList.add('visible');
  }, 3000);
}, 5000);

// Login
function enterSite(){
  if(passwordInput.value.trim() !== PASSWORD){
    error.textContent = "Senha incorreta";
    return;
  }
  document.body.classList.add('inside');
  loginScreen.classList.add('hidden');
  setTimeout(() => {
    site.classList.add('show');
  }, 100);
  updateCounters();
  setInterval(updateCounters, 1000);
  setupMessage();
}

enterBtn.addEventListener('click', enterSite);
passwordInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') enterSite();
});

// Contadores
function preciseDiff(start, end){
  let years = end.getFullYear() - start.getFullYear();
  let months = end.getMonth() - start.getMonth();
  let days = end.getDate() - start.getDate();
  let hours = end.getHours() - start.getHours();
  let minutes = end.getMinutes() - start.getMinutes();
  let seconds = end.getSeconds() - start.getSeconds();
  if(seconds < 0){ seconds += 60; minutes--; }
  if(minutes < 0){ minutes += 60; hours--; }
  if(hours < 0){ hours += 24; days--; }
  if(days < 0){
    const lastMonth = new Date(end.getFullYear(), end.getMonth(), 0).getDate();
    days += lastMonth;
    months--;
  }
  if(months < 0){ months += 12; years--; }
  return { years, months, days, hours, minutes, seconds };
}

function setValues(prefix, diff){
  document.getElementById(prefix+'y').textContent = diff.years;
  document.getElementById(prefix+'m').textContent = diff.months;
  document.getElementById(prefix+'d').textContent = diff.days;
  document.getElementById(prefix+'h').textContent = diff.hours;
  document.getElementById(prefix+'mi').textContent = diff.minutes;
  document.getElementById(prefix+'s').textContent = diff.seconds;
}

function updateCounters(){
  const now = new Date();
  setValues('o', preciseDiff(officialDate, now));
  setValues('n', preciseDiff(unofficialDate, now));
}

// Mensagem
function setupMessage(){
  const now = new Date();
  const visible = monthlyMessages.filter(item => new Date(item.date + 'T00:00:00') <= now);
  const current = visible.length ? visible[visible.length-1] : monthlyMessages[0];
  document.getElementById('monthMessage').textContent = current.text;
  const [year, month, day] = current.date.split('-').map(Number);
  const date = new Date(year, month-1, day);
  document.getElementById('monthDate').textContent = date.toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' });
}
</script>
</body>
</html>
