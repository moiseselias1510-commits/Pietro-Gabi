<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Tempo</title>

<style>

:root{
  --glass: rgba(255,255,255,0.12);
  --border: rgba(255,255,255,0.18);
  --text: #ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:"Segoe UI",sans-serif;
  background:url("fundo-site.jpg") center/cover no-repeat fixed;
  color:white;
  position:relative;
}

/* =========================
   AURA ANIME
========================= */

.aura{
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:-1;
  mix-blend-mode:screen;
  animation:animeAura 6s ease-in-out infinite;
}

.aura1{
  width:420px;
  height:420px;
  top:-120px;
  left:-120px;

  background:
    radial-gradient(circle,
      rgba(0,180,255,0.98) 0%,
      rgba(70,120,255,0.85) 22%,
      rgba(120,0,255,0.72) 48%,
      rgba(180,0,255,0.38) 68%,
      transparent 100%);

  filter:
    blur(55px)
    saturate(180%)
    brightness(1.15);

  box-shadow:
    0 0 80px rgba(0,170,255,0.55),
    0 0 140px rgba(120,0,255,0.45),
    0 0 220px rgba(180,0,255,0.28);
}

.aura2{
  width:460px;
  height:460px;
  bottom:-140px;
  right:-140px;

  background:
    radial-gradient(circle,
      rgba(180,0,255,0.98) 0%,
      rgba(120,0,255,0.82) 25%,
      rgba(0,140,255,0.65) 50%,
      rgba(0,220,255,0.34) 72%,
      transparent 100%);

  filter:
    blur(65px)
    saturate(180%)
    brightness(1.12);

  box-shadow:
    0 0 90px rgba(180,0,255,0.58),
    0 0 160px rgba(0,110,255,0.4),
    0 0 240px rgba(0,220,255,0.22);

  animation-delay:2.5s;
}

.aura::after{
  content:"";
  position:absolute;
  inset:22%;
  border-radius:50%;

  background:
    radial-gradient(circle,
      rgba(255,255,255,0.95) 0%,
      rgba(170,220,255,0.45) 35%,
      transparent 100%);

  filter:blur(22px);
  opacity:0.9;
}

@keyframes animeAura{
  0%,100%{
    transform:scale(1) translateY(0px) rotate(0deg);
    opacity:0.95;
  }

  50%{
    transform:scale(1.14) translateY(8px) rotate(-2deg);
    opacity:1;
  }
}

/* =========================
   LOGIN
========================= */

#login{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:url("fundo-login.jpg") center/cover no-repeat;
}

.login-box{
  width:100%;
  max-width:390px;
  padding:32px;
  border-radius:28px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.18);
  text-align:center;
  box-shadow:0 20px 45px rgba(0,0,0,0.2);
}

.heart{
  font-size:50px;
  margin-bottom:10px;
}

.login-box h1{
  font-size:2rem;
  margin-bottom:12px;
}

.login-box p{
  opacity:0.85;
  margin-bottom:22px;
}

input{
  width:100%;
  padding:15px;
  border:none;
  outline:none;
  border-radius:999px;
  margin-bottom:16px;
  font-size:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#4da3ff,#7b5cff);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.error{
  margin-top:12px;
  color:#ffd2d2;
}

/* =========================
   SITE
========================= */

#site{
  display:none;
  width:min(1050px,92vw);
  margin:auto;
  padding:45px 0 120px;
}

.title{
  text-align:center;
  margin-bottom:35px;
}

.title h1{
  font-size:3rem;
  margin-bottom:10px;
}

.title p{
  opacity:0.85;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

.card{
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);
  border-radius:30px;
  padding:26px;
  box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.card h2{
  text-align:center;
  margin-bottom:25px;
  font-size:1.5rem;
}

.counter{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.box{
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  padding:18px;
  text-align:center;
}

.value{
  font-size:2rem;
  font-weight:bold;
  display:block;
}

.label{
  opacity:0.8;
}

.messages{
  margin-top:24px;
}

.message-card{
  margin-top:18px;
  padding:20px;
  border-radius:22px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
}

.message-card h3{
  margin-bottom:12px;
}

.message-card p{
  line-height:1.6;
  opacity:0.92;
}

@media(max-width:850px){

  .grid{
    grid-template-columns:1fr;
  }

  .title h1{
    font-size:2.3rem;
  }

  .aura1{
    width:300px;
    height:300px;
    top:-70px;
    left:-70px;
    filter:blur(42px);
  }

  .aura2{
    width:320px;
    height:320px;
    bottom:-90px;
    right:-90px;
    filter:blur(45px);
  }

}

</style>
</head>
<body>

<div class="aura aura1"></div>
<div class="aura aura2"></div>

<section id="login">

  <div class="login-box">

    <div class="heart">💜</div>

    <h1>Nosso Tempo</h1>

    <p>Digite a senha para entrar</p>

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>

    <div class="error" id="erro"></div>

  </div>

</section>

<section id="site">

  <div class="title">
    <h1>Nosso Tempo</h1>
    <p>Dois começos, uma única história.</p>
  </div>

  <div class="grid">

    <!-- OFICIAL -->

    <div class="card">

      <h2>Oficial</h2>

      <div class="counter">

        <div class="box">
          <span class="value" id="oDias">0</span>
          <span class="label">Dias</span>
        </div>

        <div class="box">
          <span class="value" id="oHoras">0</span>
          <span class="label">Horas</span>
        </div>

        <div class="box">
          <span class="value" id="oMin">0</span>
          <span class="label">Minutos</span>
        </div>

        <div class="box">
          <span class="value" id="oSeg">0</span>
          <span class="label">Segundos</span>
        </div>

      </div>

    </div>

    <!-- NÃO OFICIAL -->

    <div class="card">

      <h2>Não oficial</h2>

      <div class="counter">

        <div class="box">
          <span class="value" id="nDias">0</span>
          <span class="label">Dias</span>
        </div>

        <div class="box">
          <span class="value" id="nHoras">0</span>
          <span class="label">Horas</span>
        </div>

        <div class="box">
          <span class="value" id="nMin">0</span>
          <span class="label">Minutos</span>
        </div>

        <div class="box">
          <span class="value" id="nSeg">0</span>
          <span class="label">Segundos</span>
        </div>

      </div>

    </div>

  </div>

  <!-- MENSAGEM -->

  <div class="messages">

    <div class="card message-card">

      <h3 id="msgData"></h3>

      <p id="msgTexto"></p>

    </div>

  </div>

</section>

<script>

const SENHA = "210425";

const oficial = new Date("2025-04-21T00:00:00");
const naoOficial = new Date("2024-10-09T00:00:00");

function entrar(){

  const senha = document.getElementById("senha").value;

  if(senha === SENHA){

    document.getElementById("login").style.display = "none";
    document.getElementById("site").style.display = "block";

  }else{
    document.getElementById("erro").innerText = "Senha incorreta";
  }

}

function atualizar(){

  atualizarContador(oficial,"o");
  atualizarContador(naoOficial,"n");

}

function atualizarContador(data,id){

  const agora = new Date();

  const diff = agora - data;

  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff / (1000*60*60)) % 24);
  const minutos = Math.floor((diff / (1000*60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById(id+"Dias").innerText = dias;
  document.getElementById(id+"Horas").innerText = horas;
  document.getElementById(id+"Min").innerText = minutos;
  document.getElementById(id+"Seg").innerText = segundos;

}

setInterval(atualizar,1000);

atualizar();

/* =========================
   MENSAGENS
========================= */

const mensagens = [

{
data:"21 de Maio de 2026",
texto:"Algumas pessoas passam pela nossa vida. Você ficou no meu coração."
},

{
data:"21 de Junho de 2026",
texto:"Mesmo depois de tanto tempo, ainda gosto de cada detalhe seu."
},

{
data:"21 de Julho de 2026",
texto:"Você transformou momentos simples nas melhores memórias da minha vida."
},

{
data:"21 de Agosto de 2026",
texto:"Se eu pudesse escolher mil vezes, ainda escolheria você."
},

{
data:"21 de Setembro de 2026",
texto:"O tempo passa, mas o sentimento continua especial."
},

{
data:"21 de Outubro de 2026",
texto:"Você continua sendo uma das melhores partes dos meus dias."
},

{
data:"21 de Novembro de 2026",
texto:"Algumas conexões simplesmente acontecem uma vez na vida."
},

{
data:"21 de Dezembro de 2026",
texto:"Obrigado por existir e fazer parte da minha história."
}

];

function atualizarMensagem(){

  const agora = new Date();

  let indice = 0;

  if(agora.getMonth() >= 4){
    indice = agora.getMonth() - 4;
  }

  if(indice >= mensagens.length){
    indice = mensagens.length - 1;
  }

  document.getElementById("msgData").innerText = mensagens[indice].data;

  document.getElementById("msgTexto").innerText = mensagens[indice].texto;

}

atualizarMensagem();

</script>

</body>
</html>
