<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nosso Tempo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  background:
  radial-gradient(circle at top,#79c9ff 0%,#8fd3ff 35%,#9ad7ff 60%,#a9ddff 100%);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px 15px;
  position:relative;
}

/* FUNDO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at 20% 20%, rgba(255,255,255,.15), transparent 30%),
  radial-gradient(circle at 80% 70%, rgba(255,255,255,.12), transparent 30%);
  pointer-events:none;
}

/* LOGIN */

#login{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  backdrop-filter:blur(10px);
  background:rgba(140,210,255,.18);
}

.login-box{
  width:320px;
  padding:35px;
  border-radius:30px;
  background:rgba(255,255,255,.22);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:
  0 10px 35px rgba(0,0,0,.15),
  inset 0 0 15px rgba(255,255,255,.15);
  text-align:center;
}

.heart{
  font-size:55px;
  margin-bottom:20px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.12);}
}

.login-box input{
  width:100%;
  padding:15px;
  border:none;
  outline:none;
  border-radius:18px;
  margin-bottom:18px;
  background:rgba(255,255,255,.35);
  color:#fff;
  font-size:15px;
}

.login-box input::placeholder{
  color:#eef6ff;
}

.login-box button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  color:white;
  font-weight:600;
  font-size:16px;
  background:linear-gradient(90deg,#3ca8ff,#7c4dff);
  box-shadow:
  0 0 20px rgba(92,130,255,.45);
}

/* SITE */

.container{
  width:100%;
  max-width:1000px;
  text-align:center;
  display:none;
}

h1{
  font-size:58px;
  font-weight:700;
  margin-bottom:5px;
  text-shadow:0 0 25px rgba(255,255,255,.55);
}

.subtitle{
  margin-bottom:45px;
  color:#eef7ff;
}

/* CARDS */

.cards{
  display:flex;
  gap:24px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  position:relative;
  width:430px;
  border-radius:35px;
  padding:28px;
  overflow:visible;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.28);
  box-shadow:
  0 10px 35px rgba(0,0,0,.15),
  inset 0 0 20px rgba(255,255,255,.08);
}

/* AURA ANIME */

.card::before{
  content:"";
  position:absolute;
  inset:-40px;
  z-index:-1;
  border-radius:45px;

  background:
  radial-gradient(circle at 50% 100%,
  rgba(0,174,255,.95),
  rgba(0,174,255,.55) 20%,
  transparent 60%),

  radial-gradient(circle at 50% 0%,
  rgba(140,0,255,.9),
  rgba(140,0,255,.45) 25%,
  transparent 65%);

  filter:blur(18px);
  opacity:.9;

  animation:
  auraDance 3s ease-in-out infinite alternate,
  auraPulse 2.5s infinite;
}

/* CHAMAS */

.card::after{
  content:"";
  position:absolute;
  inset:-25px;
  z-index:-2;
  border-radius:45px;

  background:
  conic-gradient(
    from 0deg,
    rgba(0,183,255,.0),
    rgba(0,183,255,.9),
    rgba(180,0,255,.9),
    rgba(0,183,255,.0)
  );

  filter:blur(28px);
  opacity:.9;

  animation:
  spinAura 7s linear infinite;
}

@keyframes auraDance{
  0%{
    transform:scale(1) rotate(-1deg);
    filter:blur(18px);
  }

  50%{
    transform:scale(1.05) rotate(1deg);
    filter:blur(22px);
  }

  100%{
    transform:scale(1.02) rotate(-1deg);
    filter:blur(26px);
  }
}

@keyframes auraPulse{
  0%,100%{
    opacity:.82;
  }
  50%{
    opacity:1;
  }
}

@keyframes spinAura{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

.card h2{
  margin-bottom:22px;
  font-size:35px;
}

.time-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.time-box{
  padding:25px 10px;
  border-radius:24px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);
}

.time-box span{
  display:block;
}

.number{
  font-size:55px;
  font-weight:700;
  line-height:1;
}

.label{
  margin-top:10px;
  font-size:15px;
  color:#f2f8ff;
}

/* MENSAGEM */

.message{
  margin-top:35px;
  padding:30px;
  border-radius:30px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.25);
  box-shadow:
  0 10px 35px rgba(0,0,0,.12);
}

.date{
  font-size:15px;
  opacity:.9;
  margin-bottom:10px;
}

.text{
  font-size:28px;
  font-weight:600;
}

/* RESPONSIVO */

@media(max-width:900px){

  h1{
    font-size:42px;
  }

  .card{
    width:100%;
    max-width:420px;
  }

  .number{
    font-size:45px;
  }

  .text{
    font-size:22px;
  }
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">
  <div class="login-box">

    <div class="heart">💜</div>

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>

  </div>
</div>

<!-- SITE -->

<div class="container" id="site">

  <h1>Nosso Tempo</h1>
  <div class="subtitle">Dois contadores diferentes</div>

  <div class="cards">

    <!-- OFICIAL -->

    <div class="card">

      <h2>Oficial</h2>

      <div class="time-grid">

        <div class="time-box">
          <span class="number" id="d1">0</span>
          <span class="label">Dias</span>
        </div>

        <div class="time-box">
          <span class="number" id="h1">0</span>
          <span class="label">Horas</span>
        </div>

        <div class="time-box">
          <span class="number" id="m1">0</span>
          <span class="label">Minutos</span>
        </div>

        <div class="time-box">
          <span class="number" id="s1">0</span>
          <span class="label">Segundos</span>
        </div>

      </div>

    </div>

    <!-- NÃO OFICIAL -->

    <div class="card">

      <h2>Não Oficial</h2>

      <div class="time-grid">

        <div class="time-box">
          <span class="number" id="d2">0</span>
          <span class="label">Dias</span>
        </div>

        <div class="time-box">
          <span class="number" id="h2">0</span>
          <span class="label">Horas</span>
        </div>

        <div class="time-box">
          <span class="number" id="m2">0</span>
          <span class="label">Minutos</span>
        </div>

        <div class="time-box">
          <span class="number" id="s2">0</span>
          <span class="label">Segundos</span>
        </div>

      </div>

    </div>

  </div>

  <!-- MENSAGEM -->

  <div class="message">

    <div class="date" id="dataMensagem"></div>

    <div class="text" id="mensagem">
      Você transformou meus dias em algo muito melhor.
    </div>

  </div>

</div>

<script>

/* SENHA */

function entrar(){

  const senha = document.getElementById("senha").value;

  if(senha === "1234"){

    document.getElementById("login").style.display="none";
    document.getElementById("site").style.display="block";

  }else{
    alert("Senha incorreta");
  }
}

/* DATAS */

const oficial = new Date("2025-04-21T00:00:00");
const naoOficial = new Date("2024-10-09T00:00:00");

/* CONTADOR */

function atualizar(){

  atualizarTempo(oficial,"1");
  atualizarTempo(naoOficial,"2");

}

function atualizarTempo(data,id){

  const agora = new Date();

  const diff = agora - data;

  const dias = Math.floor(diff / (1000*60*60*24));
  const horas = Math.floor((diff / (1000*60*60)) % 24);
  const minutos = Math.floor((diff / (1000*60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("d"+id).innerText=dias;
  document.getElementById("h"+id).innerText=horas;
  document.getElementById("m"+id).innerText=minutos;
  document.getElementById("s"+id).innerText=segundos;
}

setInterval(atualizar,1000);
atualizar();

/* FRASES */

const frases = [
"Você transformou meus dias em algo muito melhor.",
"Seu sorriso deixa tudo mais bonito.",
"Com você tudo parece mais leve.",
"Você é meu lugar favorito.",
"Cada momento contigo vale a pena.",
"Seu abraço parece casa.",
"Você deixa meus dias especiais.",
"Estar com você faz tudo valer a pena."
];

function atualizarMensagem(){

  const hoje = new Date();

  const index = hoje.getDate() % frases.length;

  document.getElementById("mensagem").innerText = frases[index];

  const opcoes = {
    day:'numeric',
    month:'long',
    year:'numeric'
  };

  document.getElementById("dataMensagem").innerText =
  hoje.toLocaleDateString('pt-BR',opcoes);
}

atualizarMensagem();

</script>

</body>
</html>
